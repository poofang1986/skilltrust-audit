name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python3 -m unittest discover -s tests -v
      - run: python3 skills/skilltrust-audit/scripts/skilltrust.py audit . --policy skilltrust-policy.json --fail-on high --format markdown
